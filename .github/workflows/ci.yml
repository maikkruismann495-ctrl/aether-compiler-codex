name: Aether CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, '3.10', 3.11]

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Install Aether Compiler
      run: |
        pip install -e .
    - name: Test compilation
      run: |
        echo 'namespace test' > main.ae
        echo 'def main():' >> main.ae
        echo '    say("Hello CI")' >> main.ae
        aether main.ae -o test_datapack
        if [ ! -f "test_datapack/data/test/function/main.mcfunction" ]; then
          echo "Compilation failed: main.mcfunction not generated!"
          exit 1
        fi